<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer | Tyls Charitable Foundation</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="text-slate-200 font-sans">

    <!-- Banner -->
    <header class="w-full bg-slate-950 flex justify-center">
        <div class="banner-container shadow-2xl">
            <img src="../assets/tcf-banner.png" alt="TCF Banner" class="tcf-banner-img">
        </div>
    </header>

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-slate-900/95 backdrop-blur-md border-b border-slate-800">
        <div class="max-w-6xl mx-auto px-4 h-20 flex items-center justify-between">

            <!-- Logo -->
            <a href="/index.html" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-yellow-400 rounded-lg flex items-center justify-center text-slate-900 shadow-lg">
                    <i class="fas fa-seedling"></i>
                </div>
                <div class="leading-tight">
                    <span class="block text-xl font-black text-white tracking-tighter italic">TCF</span>
                    <span class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">
                        Tyls Charitable Foundation
                    </span>
                </div>
            </a>

            <!-- Nav Links -->
            <div class="hidden md:flex gap-8 items-center font-medium text-sm uppercase tracking-widest text-slate-400">
                <a href="/index.html" class="nav-link hover:text-white">Home</a>
                <a href="/hunger.html" class="nav-link hover:text-white">Fighting Hunger</a>
                <a href="/futures.html" class="nav-link hover:text-white">Building Futures</a>
                <a href="/volunteer.html" class="nav-link text-white">Volunteer</a>
                <a href="/partners.html" class="nav-link hover:text-white">Partners</a>
            </div>

            <!-- CTA -->
            <a href="/donate.html" class="bg-yellow-400 text-slate-900 px-6 py-2 rounded-full font-black text-xs uppercase tracking-tighter hover:bg-yellow-300 transition-all shadow-xl active:scale-95">
                Donate Now
            </a>
        </div>
    </nav>

    <!-- Header -->
    <section class="py-20 px-4 text-center">
        <h1 class="text-4xl md:text-5xl font-black text-white uppercase tracking-tighter mb-6">
            Volunteer With Us
        </h1>
        <p class="text-lg text-slate-400 italic max-w-2xl mx-auto">
            Join our mission and help make a direct impact in your community.
        </p>
    </section>

    <!-- Form Section -->
    <section class="max-w-2xl mx-auto px-4 pb-20">
        <div class="bg-slate-800/50 border border-slate-700 p-10 rounded-3xl shadow-2xl">

            <form id="volunteerForm" class="space-y-5">

                <input 
                    type="text" 
                    name="name" 
                    placeholder="Full Name" 
                    required 
                    class="w-full p-3 rounded bg-slate-900 border border-slate-700"
                >

                <input 
                    type="email" 
                    name="email" 
                    placeholder="Email Address" 
                    required 
                    class="w-full p-3 rounded bg-slate-900 border border-slate-700"
                >

                <select 
                    name="interest" 
                    class="w-full p-3 rounded bg-slate-900 border border-slate-700"
                >
                    <option value="">Area of Interest</option>
                    <option value="marketing">Marketing</option>
                    <option value="food_pantry">Food Pantry</option>
                    <option value="business_outreach">Business Outreach</option>
                </select>

                <textarea 
                    name="message" 
                    placeholder="Tell us anything you'd like..." 
                    rows="4"
                    class="w-full p-3 rounded bg-slate-900 border border-slate-700"
                ></textarea>

                <button 
                    type="submit"
                    class="w-full bg-green-500 text-white py-3 rounded-full font-bold uppercase text-sm hover:bg-green-400 transition"
                >
                    Submit
                </button>

            </form>

            <p id="formStatus" class="mt-4 text-center text-sm text-green-400"></p>

        </div>
    </section>

    <!-- Footer -->
    <footer class="border-t border-slate-800 bg-slate-950 py-16 px-4">
        <div class="max-w-6xl mx-auto text-center text-slate-600">
            <span class="text-white font-black italic">TCF</span>
            <p class="text-xs mt-2">© 2026 Tyls Charitable Foundation</p>
        </div>
    </footer>

    <!-- JS -->
    <script>
        document.getElementById("volunteerForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const form = e.target;
            const data = Object.fromEntries(new FormData(form));

            try {
                await fetch("https://YOUR-ENDPOINT.com/volunteer", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });

                document.getElementById("formStatus").innerText = "Thank you for volunteering!";
                form.reset();
            } catch (err) {
                document.getElementById("formStatus").innerText = "Submission failed. Please try again.";
            }
        });
    </script>

</body>
</html>
